<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    (function () {
      var origin = window.location.origin;
      var path = window.location.pathname;
      var lowerPath = path.toLowerCase();

      if (lowerPath === "/bookkeepingva/" || lowerPath === "/bookkeepingva") {
        window.location.replace(origin + "/bookkeepingVA/");
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
